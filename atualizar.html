<!DOCTYPE html>

<body>

    <div><label>Quarta:</label><br><textarea name="quarta" rows="3"></textarea></div>

    <div><label>Sexta:</label><br><textarea name="sexta" rows="3"></textarea></div>
    <br>
    <button type="submit">Salvar</button>
  </form>
